<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konter Tycoon - Edisi COD (Bayar di Tempat)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #111827;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .game-card {
            background-color: #1f2937;
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            padding: 20px;
            border: 2px solid #374151;
        }
        h1 {
            text-align: center;
            color: #fbbf24;
            font-size: 24px;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        .author { text-align: center; font-size: 11px; color: #9ca3af; margin-bottom: 15px; }
        
        .status-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background-color: #111827;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            border: 1px solid #374151;
        }
        .money { color: #34d399; font-weight: bold; }
        .inventory-count { color: #a78bfa; font-weight: bold; }
        
        .customer-section {
            background-color: #374151;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 5px solid #fbbf24;
        }
        .customer-title { font-size: 12px; color: #9ca3af; text-transform: uppercase; margin-bottom: 6px; font-weight: bold; }
        .dialogue { font-size: 15px; font-style: italic; margin-bottom: 12px; color: #f9fafb; }
        .hp-specs { font-size: 13px; background: #111827; padding: 10px; border-radius: 8px; border: 1px solid #4b5563; }
        
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            background-color: #fbbf24;
            color: #111827;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
        }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: #4b5563; color: #9ca3af; cursor: not-allowed; transform: none; }
        button.btn-danger { background-color: #f87171; color: #fff; }
        button.btn-success { background-color: #34d399; color: #111827; }
        
        .log-section {
            margin-top: 15px;
            background-color: #111827;
            padding: 10px;
            border-radius: 8px;
            height: 100px;
            overflow-y: auto;
            font-size: 12px;
            color: #9ca3af;
            border: 1px solid #374151;
        }
        .log-entry { margin-bottom: 4px; }
        .log-success { color: #34d399; }
        .log-fail { color: #f87171; }
        .log-warn { color: #fbbf24; }
    </style>
</head>
<body>

<div class="game-card">
    <h1>Konter COD Tycoon</h1>
    <div class="author">Game oleh: LIHAN</div>

    <div class="status-bar">
        <div>Kas Modal: <br><span id="money" class="money">Rp 5.000.000</span></div>
        <div>Stok Etalase: <br><span id="inventory" class="inventory-count">0 / 3</span></div>
    </div>

    <div id="customerBox" class="customer-section">
        <div class="dialogue" style="text-align:center;">Menyalakan motor kurir... Menunggu orderan...</div>
    </div>

    <div class="action-grid">
        <button id="btnAccept" onclick="handleCOD('deal')" class="btn-success">Kirim/Terima COD</button>
        <button id="btnReject" onclick="handleCOD('reject')" class="btn-danger">Tolak Orderan</button>
    </div>

    <div id="logBox" class="log-section"></div>
</div>

<script>
    let money = 5000000;
    let inventory = [];
    const maxInventory = 3;
    let currentOrder = null;

    const hpList = [
        { name: "iPhone 11", base: 3500000 },
        { name: "Samsung S20", base: 3000000 },
        { name: "Oppo Reno 8", base: 2200000 },
        { name: "Xiaomi Note 12", base: 1400000 }
    ];

    const locations = [
        { name: "Alun-Alun (Dekat)", fee: 15000, risk: 0.05 },
        { name: "Pom Bensin Perbatasan (Sedang)", fee: 35000, risk: 0.15 },
        { name: "Desa Seberang Gunung (Jauh)", fee: 70000, risk: 0.35 }
    ];

    const names = ["Andi", "Budi", "Siti", "Rian", "Eko", "Maya"];

    function formatRp(num) { return "Rp " + num.toLocaleString('id-ID'); }

    function addLog(text, type = '') {
        const lb = document.getElementById("logBox");
        lb.innerHTML += `<div class="log-entry ${type}">${text}</div>`;
        lb.scrollTop = lb.scrollHeight;
    }

    function updateUI() {
        document.getElementById("money").innerText = formatRp(money);
        document.getElementById("inventory").innerText = `${inventory.length} / ${maxInventory}`;
        
        if (money <= 50000 && inventory.length === 0 && !currentOrder) {
            document.getElementById("customerBox").innerHTML = `<div class="dialogue" style="text-align:center; color:#f87171; font-weight:bold;">Kamu Bangkrut! Modal habis buat ongkir COD gagal.</div>`;
            document.getElementById("btnAccept").disabled = true;
            document.getElementById("btnReject").disabled = true;
        }
    }

    function spawnOrder() {
        updateUI();
        const box = document.getElementById("customerBox");
        const name = names[Math.floor(Math.random() * names.length)];
        const loc = locations[Math.floor(Math.random() * locations.length)];
        
        let type = Math.random() > 0.5 ? 'beli-cod' : 'jual-cod';
        if (inventory.length === 0) type = 'jual-cod';
        if (inventory.length >= maxInventory) type = 'beli-cod';

        if (type === 'jual-cod') {
            // Orang mau COD jual HP ke kita
            const hp = hpList[Math.floor(Math.random() * hpList.length)];
            let price = Math.floor(hp.base * (0.8 + Math.random() * 0.15));
            price = Math.floor(price / 50000) * 50000;

            currentOrder = {
                type: 'jual',
                name: name,
                hpName: hp.name,
                price: price,
                location: loc.name,
                fee: loc.fee,
                risk: loc.risk,
                baseValue: hp.base
            };

            box.innerHTML = `
                <div class="customer-title">Ajak COD Jual HP</div>
                <div class="dialogue">"${name}: Bang, ane mau jual ${hp.name}. Ketemu COD di ${loc.name} ya. Jangan telat!"</div>
                <div class="hp-specs">
                    <strong>Lokasi:</strong> ${loc.name}<br>
                    <strong>Harga HP:</strong> ${formatRp(price)}<br>
                    <strong>Bensin Kurir:</strong> ${formatRp(loc.fee)}
                </div>
            `;
            document.getElementById("btnAccept").innerText = "Jemput COD";
            document.getElementById("btnAccept").disabled = money < (price + loc.fee);
        } else {
            // Orang mau COD beli HP dari kita
            const idx = Math.floor(Math.random() * inventory.length);
            const targetItem = inventory[idx];
            let offer = Math.floor(targetItem.baseValue * (1.1 + Math.random() * 0.2));
            offer = Math.floor(offer / 50000) * 50000;

            currentOrder = {
                type: 'beli',
                name: name,
                index: idx,
                hpName: targetItem.name,
                price: offer,
                location: loc.name,
                fee: loc.fee,
                risk: loc.risk,
                boughtPrice: targetItem.boughtPrice
            };

            box.innerHTML = `
                <div class="customer-title">Pesanan COD Pembeli</div>
                <div class="dialogue">"${name}: Min, saya mau beli ${targetItem.name}-nya. Kirim COD ke ${loc.name} ya, nanti saya bayar pas kurir sampai."</div>
                <div class="hp-specs">
                    <strong>Lokasi Tujuan:</strong> ${loc.name}<br>
                    <strong>Harga Jual:</strong> <span class="money">${formatRp(offer)}</span><br>
                    <strong>Ongkos Kirim:</strong> ${formatRp(loc.fee)}
                </div>
            `;
            document.getElementById("btnAccept").innerText = "Kirim COD";
            document.getElementById("btnAccept").disabled = money < loc.fee;
        }
        document.getElementById("btnReject").disabled = false;
    }

    function handleCOD(action) {
        if (!currentOrder) return;

        if (action === 'reject') {
            addLog(`Kamu menolak pesanan COD dari ${currentOrder.name} karena lokasi terlalu berisiko.`);
            nextTurn();
            return;
        }

        // Bayar ongkos kurir/bensin dulu di awal
        money -= currentOrder.fee;

        // Cek Keberhasilan COD berdasarkan persentase resiko lokasi
        let dice = Math.random();
        if (dice < currentOrder.risk) {
            // COD GAGAL (Ditipu / Pembeli Kabur / PHP)
            addLog(`[COD GAGAL!] Kurir sampai di ${currentOrder.location}, tapi ${currentOrder.name} PHP/tidak bisa dihubungi. Rugi bensin ${formatRp(currentOrder.fee)}!`, 'log-fail');
        } else {
            // COD SUKSES
            if (currentOrder.type === 'jual') {
                money -= currentOrder.price;
                inventory.push({
                    name: currentOrder.hpName,
                    boughtPrice: currentOrder.price,
                    baseValue: currentOrder.baseValue
                });
                addLog(`[COD BERHASIL] Berhasil beli ${currentOrder.hpName} dari ${currentOrder.name} di ${currentOrder.location}.`, 'log-success');
            } else {
                money += currentOrder.price;
                let untung = currentOrder.price - currentOrder.boughtPrice - currentOrder.fee;
                addLog(`[COD BERHASIL] ${currentOrder.hpName} terjual ke ${currentOrder.name}! Untung bersih: ${formatRp(untung)}`, 'log-success');
                inventory.splice(currentOrder.index, 1);
            }
        }

        nextTurn();
    }

    function nextTurn() {
        currentOrder = null;
        document.getElementById("btnAccept").disabled = true;
        document.getElementById("btnReject").disabled = true;
        document.getElementById("customerBox").innerHTML = `<div class="dialogue" style="text-align:center;">Kurir sedang di jalan pulang...</div>`;
        updateUI();
        setTimeout(spawnOrder, 1500);
    }

    addLog("Bisnis Konter COD dimulai! Hati-hati memilih lokasi ketemuan.");
    setTimeout(spawnOrder, 800);
</script>

</body>
</html>
