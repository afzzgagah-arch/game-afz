<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underbone Modification Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background-color: #0b0f19;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 680px;
            background-color: #111827;
            border: 2px solid #1f2937;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        h1 { font-size: 22px; color: #f59e0b; text-transform: uppercase; text-align: center; margin-bottom: 2px; letter-spacing: 1px; }
        .subtitle { font-size: 11px; color: #6b7280; text-align: center; margin-bottom: 15px; font-weight: bold; }
        
        canvas {
            background: linear-gradient(to bottom, #1f2937, #111827);
            border-radius: 12px;
            border: 2px solid #1f2937;
            width: 100%;
        }

        /* Garasi Menu & Modif Panel */
        .control-panel {
            margin-top: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            padding-right: 2px;
        }
        .option-group {
            background-color: #030712;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #1f2937;
        }
        .label { font-size: 12px; color: #9ca3af; font-weight: bold; text-transform: uppercase; margin-bottom: 6px; display: block; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-choice {
            background-color: #1f2937; border: 1px solid #374151; color: #cbd5e1;
            padding: 8px 4px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.1s;
        }
        .btn-choice.active { background-color: #f59e0b; color: #030712; border-color: #f59e0b; }
        
        .color-picker-wrapper { display: flex; align-items: center; gap: 10px; }
        .input-color { background: none; border: none; width: 40px; height: 30px; cursor: pointer; }

        .btn-action {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #030712; border: none; padding: 12px; font-size: 14px;
            font-weight: bold; border-radius: 8px; cursor: pointer; text-align: center;
            box-shadow: 0 4px 12px rgba(217,119,6,0.3); margin-top: auto;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>GARASI MODIFIKASI</h1>
    <div class="subtitle">MEKANIK UTAMA: LIHAN</div>

    <canvas id="garageCanvas" width="420" height="260"></canvas>

    <div class="control-panel">
        <div class="option-group">
            <span class="label">Pilihan Velg (Wheels)</span>
            <div class="btn-grid">
                <button class="btn-choice active" onclick="changePart('wheel', 'standar', this)">Standar</button>
                <button class="btn-choice" onclick="changePart('wheel', 'jari', this)">Jari-Jari TDR</button>
                <button class="btn-choice" onclick="changePart('wheel', 'chrome', this)">Chrome Racing</button>
            </div>
        </div>

        <div class="option-group">
            <span class="label">Tipe Knalpot (Exhaust)</span>
            <div class="btn-grid">
                <button class="btn-choice active" onclick="changePart('exhaust', 'standar', this)">Standar</button>
                <button class="btn-choice" onclick="changePart('exhaust', 'brong', this)">Knalpot Brong</button>
            </div>
        </div>

        <div class="option-group">
            <span class="label">Ketinggian Shockbreaker</span>
            <div class="btn-grid">
                <button class="btn-choice" onclick="changePart('shock', 'tinggi', this)">Tinggi</button>
                <button class="btn-choice active" onclick="changePart('shock', 'normal', this)">Normal</button>
                <button class="btn-choice" onclick="changePart('shock', 'ceper', this)">Ceper (Melesek)</button>
            </div>
        </div>

        <div class="option-group">
            <div class="color-picker-wrapper">
                <span class="label" style="margin-bottom:0;">Warna Body Motor:</span>
                <input type="color" id="bodyColorPicker" class="input-color" value="#ef4444" onchange="changeColor(this.value)">
            </div>
        </div>

        <button id="actionBtn" class="btn-action" onclick="toggleMode()">TEST DRIVE (TES JALAN)</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("garageCanvas");
    const ctx = canvas.getContext("2d");

    // State Modifikasi Motor
    let currentConfig = {
        wheel: 'standar',
        exhaust: 'standar',
        shock: 'normal',
        bodyColor: '#ef4444'
    };

    let mode = 'garage'; // 'garage' atau 'testdrive'
    let animationFrameId;
    let driveX = 0;
    let bgScrollX = 0;
    let wheelRotation = 0;

    function drawMotorcycle(xOffset = 0, yOffset = 0) {
        // Atur posisi ground dasar berdasarkan tinggi shockbreaker
        let shockYModifier = 0;
        if (currentConfig.shock === 'ceper') shockYModifier = 8;
        if (currentConfig.shock === 'tinggi') shockYModifier = -6;

        let groundY = 190 + yOffset;
        let mainY = groundY - 40 + shockYModifier;
        let mainX = 140 + xOffset;

        // 1. Gambar Knalpot (Exhaust) - Digambar di belakang rangka
        ctx.save();
        ctx.translate(mainX, mainY);
        if (currentConfig.exhaust === 'standar') {
            ctx.strokeStyle = "#4b5563";
            ctx.lineWidth = 7;
            ctx.beginPath(); ctx.moveTo(-20, 20); ctx.lineTo(-70, 10); ctx.stroke();
        } else { // Knalpot Brong Racing Chrome
            ctx.strokeStyle = "#94a3b8";
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(-20, 20); ctx.lineTo(-75, -5); ctx.stroke();
            // Ujung corong biru bakar
            ctx.strokeStyle = "#3b82f6";
            ctx.lineWidth = 7;
            ctx.beginPath(); ctx.moveTo(-70, -2); ctx.lineTo(-76, -6); ctx.stroke();
        }
        ctx.restore();

        // 2. Gambar Shockbreaker Belakang
        ctx.strokeStyle = currentConfig.shock === 'ceper' ? "#ef4444" : "#fbbf24";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(mainX - 45, mainY + 10);
        ctx.lineTo(mainX - 55, mainY - 15 - shockYModifier);
        ctx.stroke();

        // 3. Gambar Ban Belakang & Depan
        drawWheel(mainX - 65, groundY, currentConfig.wheel);
        drawWheel(mainX + 95, groundY, currentConfig.wheel);

        // 4. Sasis/Rangka Swingarm bawah
        ctx.strokeStyle = "#4b5563";
        ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(mainX - 65, groundY); ctx.lineTo(mainX, mainY + 20); ctx.stroke();

        // 5. Garis Shock Depan (Teleskopik)
        ctx.strokeStyle = "#94a3b8";
        ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(mainX + 95, groundY); ctx.lineTo(mainX + 70, mainY - 45); ctx.stroke();

        // 6. BODY MOTOR UTAMA (Bebek/Underbone Style)
        ctx.fillStyle = currentConfig.bodyColor;
        ctx.beginPath();
        ctx.moveTo(mainX - 70, mainY - 15); // Sayap belakang / Jok atas
        ctx.lineTo(mainX - 10, mainY - 20); // Tengah sadel
        ctx.lineTo(mainX + 45, mainY - 35); // Dek tengah
        ctx.lineTo(mainX + 75, mainY - 45); // Batok stang kepala
        ctx.lineTo(mainX + 65, mainY - 5);  // Sayap depan dada
        ctx.lineTo(mainX + 25, mainY + 15); // Blok mesin bawah
        ctx.lineTo(mainX - 50, mainY + 20); // Spakbor kolong belakang
        ctx.closePath();
        ctx.fill();

        // Detail Jok Hitam
        ctx.fillStyle = "#1f2937";
        ctx.beginPath();
        ctx.moveTo(mainX - 68, mainY - 15);
        ctx.lineTo(mainX + 15, mainY - 22);
        ctx.lineTo(mainX + 20, mainY - 12);
        ctx.lineTo(mainX - 50, mainY - 2);
        ctx.closePath();
        ctx.fill();

        // Stang Kemudi Mini
        ctx.strokeStyle = "#111827";
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(mainX + 72, mainY - 43); ctx.lineTo(mainX + 60, mainY - 48); ctx.stroke();
    }

    function drawWheel(x, y, type) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(wheelRotation);

        // Ban Luar Hitam
        ctx.beginPath();
        ctx.arc(0, 0, 26, 0, Math.PI * 2);
        ctx.fillStyle = "#1e293b";
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = "#0f172a";
        ctx.stroke();

        // Tipe Velg Dalam
        if (type === 'standar') {
            ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2);
            ctx.fillStyle = "#64748b"; ctx.fill();
            // Palang 5 Balok standar
            ctx.strokeStyle = "#334155"; ctx.lineWidth = 4;
            for(let i=0; i<5; i++) {
                ctx.rotate((2 * Math.PI) / 5);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, 18); ctx.stroke();
            }
        } else if (type === 'jari') {
            ctx.beginPath(); ctx.arc(0, 0, 19, 0, Math.PI * 2);
            ctx.fillStyle = "#111827"; ctx.fill();
            ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 1;
            // Anyaman ruji/jari-jari emas/silver
            for(let i=0; i<36; i++) {
                ctx.rotate((2 * Math.PI) / 36);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, 19); ctx.stroke();
            }
        } else if (type === 'chrome') {
            // Velg Chrome Mengkilap Lingkaran Tipis
            ctx.beginPath(); ctx.arc(0, 0, 19, 0, Math.PI * 2);
            ctx.lineWidth = 3; ctx.strokeStyle = "#f1f5f9"; ctx.stroke();
            ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fill();
            // Palang bintang sport racing
            ctx.strokeStyle = "#f1f5f9"; ctx.lineWidth = 3;
            for(let i=0; i<3; i++) {
                ctx.rotate((2 * Math.PI) / 3);
                ctx.beginPath(); ctx.moveTo(0,-19); ctx.lineTo(0, 19); ctx.stroke();
            }
        }

        // Hub As Tengah
        ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2);
        ctx.fillStyle = "#cbd5e1"; ctx.fill();

        ctx.restore();
    }

    function renderGarage() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Gambar Lantai Tegel Bengkel
        ctx.fillStyle = "#374151"; ctx.fillRect(0, 190, canvas.width, canvas.height - 190);
        ctx.fillStyle = "#1f2937";
        for (let i = 0; i < canvas.width; i += 40) {
            ctx.fillRect(i, 190, 2, canvas.height - 190);
        }

        // Gambar Standar Tengah Penahan Motor (Hanya ada di Garasi)
        ctx.strokeStyle = "#94a3b8"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(140, 180); ctx.lineTo(125, 215); ctx.lineTo(115, 215); ctx.stroke();

        drawMotorcycle();
    }

    // Loop Animasi Jalan Raya (Test Drive)
    function renderTestDrive() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Gerakkan Background Jalanan Lurus
        bgScrollX -= 8;
        if (bgScrollX < -60) bgScrollX = 0;
        wheelRotation += 0.25; // Putar roda motor

        // Aspal Jalanan Bergerak
        ctx.fillStyle = "#1f2937"; ctx.fillRect(0, 190, canvas.width, canvas.height - 190);
        ctx.fillStyle = "#fbbf24"; // Markah jalan kuning putus-putus
        for(let i = bgScrollX; i < canvas.width + 100; i += 60) {
            ctx.fillRect(i, 215, 35, 5);
        }

        // Efek Jamping/Getaran Mesin tipis (Vibration Effect)
        let engineVibeY = Math.sin(Date.now() * 0.05) * 1.5;

        drawMotorcycle(-20, engineVibeY);

        animationFrameId = requestAnimationFrame(renderTestDrive);
    }

    function changePart(category, value, btnElement) {
        currentConfig[category] = value;
        
        // Ganti status kelas tombol aktif
        const siblings = btnElement.parentElement.querySelectorAll('.btn-choice');
        siblings.forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');

        if (mode === 'garage') renderGarage();
    }

    function changeColor(hexColor) {
        currentConfig.bodyColor = hexColor;
        if (mode === 'garage') renderGarage();
    }

    function toggleMode() {
        const btn = document.getElementById("actionBtn");
        if (mode === 'garage') {
            mode = 'testdrive';
            btn.innerText = "KEMBALI KE GARASI";
            btn.style.background = "linear-gradient(135deg, #ef4444, #b91c1c)";
            btn.style.color = "#fff";
            renderTestDrive();
        } else {
            mode = 'garage';
            btn.innerText = "TEST DRIVE (TES JALAN)";
            btn.style.background = "linear-gradient(135deg, #f59e0b, #d97706)";
            btn.style.color = "#030712";
            cancelAnimationFrame(animationFrameId);
            renderGarage();
        }
    }

    // Booting Game Pertama Kali
    renderGarage();
</script>
</body>
    </html>
