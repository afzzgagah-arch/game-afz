<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
            max-width: 100%;
            padding: 10px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            color: #4ecca3;
            text-shadow: 0 0 10px rgba(78, 204, 163, 0.3);
        }
        .score-board {
            font-size: 18px;
            margin-bottom: 15px;
            color: #eee;
        }
        #gameCanvas {
            background-color: #162447;
            border: 4px solid #4ecca3;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: block;
            margin: 0 auto;
            max-width: 100%;
        }
        .controls {
            margin-top: 15px;
            font-size: 14px;
            color: #818698;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>RETRO SNAKE</h1>
    <div class="score-board">Skor: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        Gunakan **Panah Keyboard** (W/A/S/D) untuk berbelok.<br>
        Atau **Sentuh/Geser Layar** jika bermain di HP.
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    // Logika Ular
    let snake = [{x: 10, y: 10}];
    let food = {x: 5, y: 5};
    let dx = 1; // arah x (1 = kanan, -1 = kiri)
    let dy = 0; // arah y (1 = bawah, -1 = atas)
    let score = 0;
    let gameInterval;
    let gameSpeed = 100; // Kecepatan game dalam milidetik
    let gameOver = false;

    function main() {
        if (gameOver) return;

        if (hasGameEnded()) {
            gameOver = true;
            drawGameOver();
            return;
        }

        clearCanvas();
        drawFood();
        moveSnake();
        drawSnake();
    }

    // Mulai game loop
    resetGame();

    function resetGame() {
        snake = [{x: 10, y: 10}];
        generateFood();
        dx = 1;
        dy = 0;
        score = 0;
        scoreElement.textContent = score;
        gameOver = false;
        
        clearInterval(gameInterval);
        gameInterval = setInterval(main, gameSpeed);
    }

    function clearCanvas() {
        ctx.fillStyle = "#162447";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawSnake() {
        snake.forEach((part, index) => {
            // Kepala ular warna hijau terang, badan warna hijau biasa
            ctx.fillStyle = index === 0 ? "#4ecca3" : "#349274";
            ctx.strokeStyle = "#162447";
            ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
        });
    }

    function moveSnake() {
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};
        snake.unshift(head);

        // Cek jika ular memakan makanan
        if (snake[0].x === food.x && snake[0].y === food.y) {
            score += 10;
            scoreElement.textContent = score;
            generateFood();
        } else {
            snake.pop(); // Hapus ekor jika tidak makan
        }
    }

    function generateFood() {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);

        // Pastikan makanan tidak muncul di tubuh ular
        snake.forEach(part => {
            if (part.x === food.x && part.y === food.y) {
                generateFood();
            }
        });
    }

    function drawFood() {
        ctx.fillStyle = "#e056fd"; // Warna makanan (ungu neon)
        ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
    }

    function hasGameEnded() {
        // Tabrak dinding kiri/kanan/atas/bawah
        if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
            return true;
        }
        // Tabrak badan sendiri
        for (let i = 1; i < snake.length; i++) {
            if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
        }
        return false;
    }

    function drawGameOver() {
        ctx.fillStyle = "rgba(22, 36, 71, 0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ff4a5a";
        ctx.font = "bold 30px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 15);

        ctx.fillStyle = "#fff";
        ctx.font = "16px sans-serif";
        ctx.fillText("Tekan tombol apapun / Klik untuk reset", canvas.width / 2, canvas.height / 2 + 25);
    }

    // Kontrol Keyboard
    document.addEventListener("keydown", event => {
        if (gameOver) {
            resetGame();
            return;
        }

        const keyPressed = event.key.toLowerCase();
        const goingUp = dy === -1;
        const goingDown = dy === 1;
        const goingRight = dx === 1;
        const goingLeft = dx === -1;

        if ((keyPressed === "arrowleft" || keyPressed === "a") && !goingRight) {
            dx = -1; dy = 0;
        }
        if ((keyPressed === "arrowup" || keyPressed === "w") && !goingDown) {
            dx = 0; dy = -1;
        }
        if ((keyPressed === "arrowright" || keyPressed === "d") && !goingLeft) {
            dx = 1; dy = 0;
        }
        if ((keyPressed === "arrowdown" || keyPressed === "s") && !goingUp) {
            dx = 0; dy = 1;
        }
    });

    // Kontrol Sentuh/Klik untuk HP atau restart cepat
    canvas.addEventListener("click", () => {
        if (gameOver) resetGame();
    });

    // Fitur Geser Layar (Swipe) untuk HP
    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, false);

    document.addEventListener('touchend', e => {
        if (gameOver) {
            resetGame();
            return;
        }

        let touchEndX = e.changedTouches[0].screenX;
        let touchEndY = e.changedTouches[0].screenY;

        let diffX = touchEndX - touchStartX;
        let diffY = touchEndY - touchStartY;

        if (Math.abs(diffX) > Math.abs(diffY)) {
            // Gerakan Horizontal
            if (diffX > 0 && dx !== -1) { dx = 1; dy = 0; } // Kanan
            else if (diffX < 0 && dx !== 1) { dx = -1; dy = 0; } // Kiri
        } else {
            // Gerakan Vertikal
            if (diffY > 0 && dy !== -1) { dx = 0; dy = 1; } // Bawah
            else if (diffY < 0 && dy !== 1) { dx = 0; dy = -1; } // Atas
        }
    }, false);
</script>

</body>
</html>
