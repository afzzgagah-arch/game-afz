<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartphone Tycoon - Jual Beli HP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .game-card {
            background-color: #1e293b;
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            padding: 20px;
            border: 2px solid #334155;
        }
        h1 {
            text-align: center;
            color: #38bdf8;
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .author {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            background-color: #0f172a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            border: 1px solid #334155;
        }
        .money { color: #4ade80; }
        .inventory-count { color: #a78bfa; }
        
        .customer-section {
            background-color: #334155;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .customer-title {
            font-size: 14px;
            color: #cbd5e1;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .dialogue {
            font-size: 16px;
            font-style: italic;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .hp-specs {
            font-size: 13px;
            background: #1e293b;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: #64748b; color: #94a3b8; cursor: not-allowed; transform: none; }
        button.btn-danger { background-color: #f87171; color: #fff; }
        button.btn-success { background-color: #4ade80; color: #0f172a; }
        
        .log-section {
            margin-top: 20px;
            background-color: #0f172a;
            padding: 10px;
            border-radius: 8px;
            height: 100px;
            overflow-y: auto;
            font-size: 12px;
            color: #94a3b8;
            border: 1px solid #334155;
        }
        .log-entry { margin-bottom: 4px; }
        .log-success { color: #4ade80; }
        .log-fail { color: #f87171; }
    </style>
</head>
<body>

<div class="game-card">
    <h1>Konter Tycoon</h1>
    <div class="author">Game oleh: LIHAN</div>

    <!-- Status Toko -->
    <div class="status-bar">
        <div>Modal: <span id="money" class="money">Rp 5.000.000</span></div>
        <div>Stok HP: <span id="inventory" class="inventory-count">0/3</span></div>
    </div>

    <!-- Area Pelanggan -->
    <div id="customerBox" class="customer-section">
        <!-- Konten diisi otomatis oleh JavaScript -->
    </div>

    <!-- Tombol Aksi -->
    <div class="action-buttons">
        <button id="btnLeft" onclick="handleAction('left')">Beli</button>
        <button id="btnRight" onclick="handleAction('right')" class="btn-danger">Tolak</button>
    </div>

    <!-- Log Aktivitas -->
    <div id="logBox" class="log-section">
        <div class="log-entry">Toko resmi dibuka! Menunggu pelanggan datang...</div>
    </div>
</div>

<script>
    // State Game
    let money = 5000000;
    let inventory = [];
    const maxInventory = 3;
    let currentEvent = null; // Menyimpan data pelanggan saat ini

    // Data HP untuk variasi game
    const hpModels = [
        { name: "iPhon 11", basePrice: 3500000 },
        { name: "Samsul Galaxy S20", basePrice: 3000000 },
        { name: "Siomi Note 12", basePrice: 1500000 },
        { name: "Infinik Hot 40", basePrice: 1000000 },
        { name: "Opo Reno 8", basePrice: 2200000 }
    ];

    const conditions = [
        { label: "Mulus Likenew", multiplier: 1.1 },
        { label: "Layar Retak Dikit", multiplier: 0.7 },
        { label: "Batangan / No Box", multiplier: 0.8 },
        { label: "Bootloop / Mati Total", multiplier: 0.4 }
    ];

    const customerNames = ["Andi", "Budi", "Siti", "Rian", "Dewi", "Fajar"];

    function formatRupiah(angka) {
        return "Rp " + angka.toLocaleString('id-ID');
    }

    function addLog(text, type = '') {
        const logBox = document.getElementById("logBox");
        const entry = document.createElement("div");
        entry.className = `log-entry ${type}`;
        entry.innerText = text;
        logBox.appendChild(entry);
        logBox.scrollTop = logBox.scrollHeight;
    }

    function updateUI() {
        document.getElementById("money").innerText = formatRupiah(money);
        document.getElementById("inventory").innerText = `${inventory.length}/${maxInventory}`;
    }

    // Memunculkan pelanggan baru secara acak (bisa mau jual atau mau beli)
    function generateCustomer() {
        updateUI();
        const customerBox = document.getElementById("customerBox");
        const btnLeft = document.getElementById("btnLeft");
        const btnRight = document.getElementById("btnRight");
        
        const name = customerNames[Math.floor(Math.random() * customerNames.length)];
        
        // Keputusan: Pelanggan mau JUAL ke kita, atau MAU BELI dari kita
        // Jika inventori kosong, otomatis ada orang jual. Jika penuh, otomatis ada orang beli.
        let mode = Math.random() > 0.5 ? 'jual' : 'beli';
        if (inventory.length === 0) mode = 'jual';
        if (inventory.length >= maxInventory) mode = 'beli';

        if (mode === 'jual') {
            // Pelanggan mau menjual HP bekasnya ke toko kita
            const hp = hpModels[Math.floor(Math.random() * hpModels.length)];
            const cond = conditions[Math.floor(Math.random() * conditions.length)];
            
            // Hitung harga tawaran dari pelanggan
            let offerPrice = Math.floor(hp.basePrice * cond.multiplier * (0.8 + Math.random() * 0.2));
            // Bulatkan ke kelipatan 50rb
            offerPrice = Math.floor(offerPrice / 50000) * 50000;

            currentEvent = {
                type: 'jual',
                hpName: hp.name,
                condition: cond.label,
                price: offerPrice,
                estimatedValue: Math.floor(hp.basePrice * cond.multiplier) // Harga pasaran asli
            };

            customerBox.innerHTML = `
                <div class="customer-title">Pelanggan: ${name} (Mau Jual)</div>
                <div class="dialogue">"Bang, saya mau jual ${currentEvent.hpName} saya nih. Lagi butuh uang mendesak."</div>
                <div class="hp-specs">
                    <strong>Kondisi:</strong> ${currentEvent.condition}<br>
                    <strong>Harga Ditawarkan:</strong> <span class="money">${formatRupiah(offerPrice)}</span>
                </div>
            `;
            
            btnLeft.innerText = "Beli HP";
            btnLeft.className = "btn-success";
            btnRight.innerText = "Tolak";
            btnRight.className = "btn-danger";
            
            // Disable jika uang tidak cukup
            btnLeft.disabled = money < offerPrice;

        } else {
            // Pelanggan mau membeli salah satu koleksi HP kita
            const randomIndex = Math.floor(Math.random() * inventory.length);
            const targetHp = inventory[randomIndex];
            
            // Pelanggan menawar harga (bisa untung besar atau tipis tergantung keberuntungan)
            let buyOffer = Math.floor(targetHp.estimatedValue * (1.1 + Math.random() * 0.3));
            buyOffer = Math.floor(buyOffer / 50000) * 50000;

            currentEvent = {
                type: 'beli',
                inventoryIndex: randomIndex,
                hpName: targetHp.name,
                price: buyOffer,
                profit: buyOffer - targetHp.boughtPrice
            };

            customerBox.innerHTML = `
                <div class="customer-title">Pelanggan: ${name} (Mau Beli)</div>
                <div class="dialogue">"Saya nyari HP seken. Itu yang di etalase, ${currentEvent.hpName}, kalau harganya cocok saya angkut."</div>
                <div class="hp-specs">
                    <strong>Kondisi HP kamu:</strong> ${targetHp.condition}<br>
                    <strong>Dia Tawar Seharga:</strong> <span class="money">${formatRupiah(buyOffer)}</span>
                </div>
            `;

            btnLeft.innerText = "Lepas (Jual)";
            btnLeft.className = "btn-success";
            btnRight.innerText = "Jangan Jual";
            btnRight.className = "btn-danger";
            btnLeft.disabled = false;
        }
    }

    function handleAction(choice) {
        if (!currentEvent) return;

        if (currentEvent.type === 'jual') {
            if (choice === 'left') {
                // Konfirmasi Beli
                money -= currentEvent.price;
                inventory.push({
                    name: currentEvent.hpName,
                    condition: currentEvent.condition,
                    boughtPrice: currentEvent.price,
                    estimatedValue: currentEvent.estimatedValue
                });
                addLog(`Berhasil membeli ${currentEvent.hpName} seharga ${formatRupiah(currentEvent.price)}`, 'log-success');
            } else {
                addLog(`Kamu menolak tawaran penjualan HP.`);
            }
        } else if (currentEvent.type === 'beli') {
            if (choice === 'left') {
                // Konfirmasi Jual ke pelanggan
                money += currentEvent.price;
                // Hapus dari inventori
                inventory.splice(currentEvent.inventoryIndex, 1);
                
                const untungRugi = currentEvent.profit >= 0 ? 'Untung' : 'Rugi';
                const logClass = currentEvent.profit >= 0 ? 'log-success' : 'log-fail';
                
                addLog(`Jual ${currentEvent.hpName}! Dapat ${formatRupiah(currentEvent.price)} (${untungRugi}: ${formatRupiah(Math.abs(currentEvent.profit))})`, logClass);
            } else {
                addLog(`Kamu menolak melepas HP ke pembeli.`);
            }
        }

        // Reset event dan panggil pelanggan berikutnya setelah jeda singkat
        currentEvent = null;
        updateUI();
        
        document.getElementById("customerBox").innerHTML = `<div class="dialogue" style="text-align:center;">Mencari pelanggan baru...</div>`;
        document.getElementById("btnLeft").disabled = true;
        document.getElementById("btnRight").disabled = true;

        setTimeout(generateCustomer, 1200);
    }

    // Jalankan game pertama kali
    setTimeout(generateCustomer, 500);
</script>

</body>
</html>
