<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konter Tycoon Remastered</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .game-card {
            background-color: #1e293b;
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            padding: 20px;
            border: 2px solid #334155;
        }
        h1 {
            text-align: center;
            color: #38bdf8;
            font-size: 26px;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }
        .author {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        .status-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background-color: #0f172a;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #334155;
            font-size: 14px;
        }
        .money { color: #4ade80; font-weight: bold; }
        .inventory-count { color: #a78bfa; font-weight: bold; }
        
        .customer-section {
            background-color: #334155;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            border-left: 5px solid #38bdf8;
        }
        .customer-title {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .dialogue {
            font-size: 15px;
            font-style: italic;
            margin-bottom: 12px;
            line-height: 1.4;
            color: #f1f5f9;
        }
        .hp-specs {
            font-size: 13px;
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            line-height: 1.5;
            border: 1px solid #475569;
        }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 4px;
        }
        .badge-fix { background-color: #eab308; color: #0f172a; }
        .badge-ok { background-color: #22c55e; color: #fff; }
        
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .full-width-btn {
            grid-column: span 2;
        }
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { background-color: #475569; color: #94a3b8; cursor: not-allowed; opacity: 0.6; }
        button.btn-danger { background-color: #ef4444; color: #fff; }
        button.btn-success { background-color: #22c55e; color: #fff; }
        button.btn-warning { background-color: #f59e0b; color: #fff; }
        
        .log-section {
            background-color: #0f172a;
            padding: 10px;
            border-radius: 8px;
            height: 110px;
            overflow-y: auto;
            font-size: 12px;
            color: #94a3b8;
            border: 1px solid #334155;
        }
        .log-entry { margin-bottom: 5px; padding-bottom: 2px; border-bottom: 1px dashed #1e293b; }
        .log-success { color: #4ade80; }
        .log-fail { color: #f87171; }
        .log-warn { color: #facc15; }
    </style>
</head>
<body>

<div class="game-card">
    <h1>Konter Tycoon v2</h1>
    <div class="author">Game oleh: LIHAN</div>

    <!-- Status Toko -->
    <div class="status-bar">
        <div>Modal: <br><span id="money" class="money">Rp 5.000.000</span></div>
        <div>Kapasitas Rak: <br><span id="inventory" class="inventory-count">0 / 3</span></div>
    </div>

    <!-- Area Pelanggan -->
    <div id="customerBox" class="customer-section">
        <div class="dialogue" style="text-align:center;">Membuka gembok konter... Menunggu pelanggan...</div>
    </div>

    <!-- Tombol Kendali Utama -->
    <div class="action-grid">
        <button id="btnAccept" onclick="dealAction('deal')" class="btn-success">Terima</button>
        <button id="btnNego" onclick="dealAction('nego')" class="btn-warning">Nego Harga</button>
        <button id="btnReject" onclick="dealAction('reject')" class="btn-danger">Tolak</button>
        <button id="btnService" onclick="dealAction('service')" class="btn-warning" disabled>Servis HP (Rp 400rb)</button>
    </div>

    <!-- Log Aktivitas -->
    <div id="logBox" class="log-section"></div>
</div>

<script>
    // Konfigurasi awal game
    let money = 5000000;
    let inventory = [];
    const maxInventory = 3;
    let currentCustomer = null;
    let negoCount = 0;

    const hpPool = [
        { name: "iPhone 11", baseValue: 3800000 },
        { name: "Samsung S20", baseValue: 3200000 },
        { name: "Xiaomi Note 12", baseValue: 1600000 },
        { name: "Oppo Reno 8", baseValue: 2400000 },
        { name: "Vivo V25", baseValue: 2000000 }
    ];

    const condPool = [
        { status: "Mulus Likenew", mult: 1.0, needFix: false },
        { status: "Batangan (No Box)", mult: 0.85, needFix: false },
        { status: "Layar Retak", mult: 0.6, needFix: true },
        { status: "Mati Total / Bootloop", mult: 0.35, needFix: true }
    ];

    const names = ["Rian", "Siti", "Budi", "Dewi", "Dimas", "Amel", "Fikri"];

    function formatRp(num) {
        return "Rp " + num.toLocaleString('id-ID');
    }

    function pushLog(msg, clr = '') {
        const logBox = document.getElementById("logBox");
        logBox.innerHTML += `<div class="log-entry ${clr}">${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function refreshUI() {
        document.getElementById("money").innerText = formatRp(money);
        document.getElementById("inventory").innerText = `${inventory.length} / ${maxInventory}`;
        
        // Cek kondisi bangkrut
        if (money <= 200000 && inventory.length === 0 && !currentCustomer) {
            document.getElementById("customerBox").innerHTML = `<div class="dialogue" style="text-align:center; color:#ef4444; font-weight:bold;">Toko Kamu Bangkrut! Uang habis & stok kosong. Refresh browser untuk reset game.</div>`;
            disableAllButtons();
        }
    }

    function disableAllButtons() {
        document.getElementById("btnAccept").disabled = true;
        document.getElementById("btnNego").disabled = true;
        document.getElementById("btnReject").disabled = true;
        document.getElementById("btnService").disabled = true;
    }

    function spawnCustomer() {
        refreshUI();
        negoCount = 0;
        
        // Pilih tipe event secara seimbang
        let type = Math.random() > 0.5 ? 'jual' : 'beli';
        if (inventory.length === 0) type = 'jual';
        if (inventory.length >= maxInventory) type = 'beli';

        const name = names[Math.floor(Math.random() * names.length)];
        const box = document.getElementById("customerBox");
        
        if (type === 'jual') {
            const model = hpPool[Math.floor(Math.random() * hpPool.length)];
            const cond = condPool[Math.floor(Math.random() * condPool.length)];
            
            let marketPrice = Math.floor(model.baseValue * cond.mult);
            let askingPrice = Math.floor(marketPrice * (0.85 + Math.random() * 0.15));
            askingPrice = Math.floor(askingPrice / 50000) * 50000;

            currentCustomer = {
                type: 'jual',
                name: name,
                hpName: model.name,
                condition: cond.status,
                needFix: cond.needFix,
                price: askingPrice,
                marketPrice: marketPrice
            };

            box.innerHTML = `
                <div class="customer-title">Pelanggan: ${name} (Mau Jual HP)</div>
                <div class="dialogue">"Bang, mau jual ${model.name}. Kondisinya ${cond.status}. Lepas berapa ya pasnya?"</div>
                <div class="hp-specs">
                    <strong>Harga Minta:</strong> <span class="money">${formatRp(askingPrice)}</span><br>
                    <strong>Status Unit:</strong> ${cond.needFix ? '<span class="badge badge-fix">Butuh Servis</span>' : '<span class="badge badge-ok">Siap Jual</span>'}
                </div>
            `;

            document.getElementById("btnAccept").innerText = "Beli Unit";
            document.getElementById("btnAccept").disabled = money < askingPrice;
            document.getElementById("btnNego").disabled = false;
            document.getElementById("btnReject").disabled = false;
            document.getElementById("btnService").disabled = true;

        } else {
            // Pelanggan mau beli dari stok kita
            const stockIndex = Math.floor(Math.random() * inventory.length);
            const targetItem = inventory[stockIndex];

            // Tentukan harga penawaran awal pembeli
            let baseOffer = targetItem.needFix ? targetItem.marketPrice * 0.7 : targetItem.marketPrice * 1.25;
            let buyOffer = Math.floor(baseOffer * (0.95 + Math.random() * 0.15));
            buyOffer = Math.floor(buyOffer / 50000) * 50000;

            currentCustomer = {
                type: 'beli',
                name: name,
                stockIndex: stockIndex,
                hpName: targetItem.name,
                price: buyOffer,
                itemData: targetItem
            };

            box.innerHTML = `
                <div class="customer-title">Pelanggan: ${name} (Mau Beli HP)</div>
                <div class="dialogue">"Saya lagi nyari HP seken nih. Tertarik sama ${targetItem.name} yang ${targetItem.condition} itu. Dilepas segini dapet?"</div>
                <div class="hp-specs">
                    <strong>Kondisi HP Toko:</strong> ${targetItem.condition} ${targetItem.needFix ? '(Rusak)' : '(Bagus)'}<br>
                    <strong>Tawaran Pembeli:</strong> <span class="money">${formatRp(buyOffer)}</span>
                </div>
            `;

            document.getElementById("btnAccept").innerText = "Lepas HP";
            document.getElementById("btnAccept").disabled = false;
            document.getElementById("btnNego").disabled = targetItem.needFix; // Tidak bisa nego kalau HP rusak
            document.getElementById("btnReject").disabled = false;
            
            // Logika tombol servis aktif jika item yang dipilih rusak & uang cukup
            document.getElementById("btnService").disabled = !targetItem.needFix || money < 400000;
        }
    }

    function dealAction(action) {
        if (!currentCustomer) return;
        const box = document.getElementById("customerBox");

        if (action === 'reject') {
            pushLog(`${currentCustomer.name} meninggalkan konter karena tawaran ditolak.`);
            nextTurn();
            return;
        }

        if (action === 'service') {
            // Servis HP yang sedang dinegosiasikan pembeli
            money -= 400000;
            const idx = currentCustomer.stockIndex;
            inventory[idx].needFix = false;
            inventory[idx].condition = "Mulus (Habis Servis)";
            inventory[idx].marketPrice = Math.floor(inventory[idx].marketPrice * 1.8); // Nilai jual naik tajam
            pushLog(`Berhasil servis ${inventory[idx].name}! Biaya: Rp 400.000. Harga jual melonjak!`, 'log-warn');
            
            // Reset customer agar dia kalkulasi ulang penawaran barunya
            currentCustomer = null;
            nextTurn();
            return;
        }

        if (action === 'nego') {
            if (negoCount >= 2) {
                pushLog(`${currentCustomer.name} kesal karena kamu kebanyakan nego dan pergi!`, 'log-fail');
                nextTurn();
                return;
            }
            
            negoCount++;
            let chance = Math.random();

            if (chance > 0.4) { // Sukses Nego (60% Berhasil)
                if (currentCustomer.type === 'jual') {
                    currentCustomer.price -= Math.floor(currentCustomer.price * 0.08); // Harga beli jadi lebih murah
                    pushLog(`Nego berhasil! ${currentCustomer.name} menurunkan harga pasnya.`, 'log-success');
                } else {
                    currentCustomer.price += Math.floor(currentCustomer.price * 0.08); // Pembeli mau bayar lebih mahal
                    pushLog(`Nego berhasil! ${currentCustomer.name} menaikkan budget belinya.`, 'log-success');
                }
                // Update tampilan teks harga baru
                box.querySelector('.money').innerText = formatRp(currentCustomer.price);
            } else { // Gagal Nego
                pushLog(`Nego gagal! ${currentCustomer.name} bersikeras dengan harga awal.`, 'log-warn');
            }
            return;
        }

        if (action === 'deal') {
            if (currentCustomer.type === 'jual') {
                // Proses beli HP dari orang
                money -= currentCustomer.price;
                inventory.push({
                    name: currentCustomer.hpName,
                    condition: currentCustomer.condition,
                    needFix: currentCustomer.needFix,
                    boughtPrice: currentCustomer.price,
                    marketPrice: currentCustomer.marketPrice
                });
                pushLog(`Beli ${currentCustomer.hpName} dari ${currentCustomer.name} seharga ${formatRp(currentCustomer.price)}`, 'log-success');
            } else {
                // Proses jual HP ke orang
                money += currentCustomer.price;
                let profit = currentCustomer.price - currentCustomer.itemData.boughtPrice;
                let profitColor = profit >= 0 ? 'log-success' : 'log-fail';
                
                pushLog(`Jual ${currentCustomer.hpName} ke ${currentCustomer.name} seharga ${formatRp(currentCustomer.price)} (Untung: ${formatRp(profit)})`, profitColor);
                inventory.splice(currentCustomer.stockIndex, 1);
            }
            nextTurn();
        }
    }

    function nextTurn() {
        currentCustomer = null;
        disableAllButtons();
        document.getElementById("customerBox").innerHTML = `<div class="dialogue" style="text-align:center;">Mencari pelanggan baru...</div>`;
        refreshUI();
        setTimeout(spawnCustomer, 1500);
    }

    // Inisialisasi awal saat halaman dibuka
    pushLog("Konter resmi dibuka! Yuk cari cuan maksimal.");
    setTimeout(spawnCustomer, 1000);
</script>

</body>
</html>
