            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        
        /* Menu Overlay Screens */
        .screen {
            position: absolute;
            inset: 0;
            background: rgba(9, 13, 22, 0.95);
            border-radius: 17px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }
